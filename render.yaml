services:
  - type: web
    name: kali-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 5001
      - key: API_KEY
        sync: false # User will need to set this in Render dashboard
